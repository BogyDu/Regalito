<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina en Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #252525;
    --accent-g: #c8f55a;
    --accent-p: #f55a8c;
    --accent-a: #5ac8f5;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 48px 24px; }

  /* Header */
  header { margin-bottom: 56px; }
  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 10vw, 96px);
    line-height: 0.92;
    letter-spacing: 2px;
  }
  h1 span { display: block; }
  h1 .line-g { color: var(--accent-g); }
  h1 .line-p { color: var(--accent-p); }
  h1 .line-a { color: var(--accent-a); }

  .subtitle {
    margin-top: 20px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 420px;
    line-height: 1.6;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 22px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .tab-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tab-btn[data-tab="gluteo"] { --tc: var(--accent-g); }
  .tab-btn[data-tab="piernas"] { --tc: var(--accent-p); }
  .tab-btn[data-tab="abdomen"] { --tc: var(--accent-a); }

  .tab-btn.active, .tab-btn:hover {
    border-color: var(--tc);
    color: var(--tc);
    background: color-mix(in srgb, var(--tc) 8%, transparent);
  }

  /* Grid */
  .exercises-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .exercise-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    animation: fadeIn 0.35s ease both;
    position: relative;
    overflow: hidden;
  }
  .exercise-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-color);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s ease;
  }
  .exercise-card:hover { border-color: var(--accent-color); transform: translateY(-2px); }
  .exercise-card:hover::after { transform: scaleY(1); }
  .exercise-card.done { opacity: 0.45; }
  .exercise-card.done .check { background: var(--accent-color); border-color: var(--accent-color); color: #000; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .exercise-icon {
    font-size: 28px;
    line-height: 1;
  }

  .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: var(--text);
  }

  .exercise-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    background: color-mix(in srgb, var(--accent-color) 12%, transparent);
    color: var(--accent-color);
    border: 1px solid color-mix(in srgb, var(--accent-color) 25%, transparent);
  }

  .exercise-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .expand-icon {
    margin-top: 14px;
    font-size: 12px;
    color: var(--accent-color);
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.2s;
    text-transform: uppercase;
  }
  .exercise-card:hover .expand-icon { opacity: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    max-width: 520px;
    width: 100%;
    padding: 36px;
    position: relative;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-close {
    position: absolute; top: 20px; right: 20px;
    background: transparent; border: 1.5px solid var(--border);
    color: var(--muted); cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--text); color: var(--text); }

  .modal-icon { font-size: 48px; margin-bottom: 16px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h3 {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .modal-section p, .modal-section li {
    font-size: 14px;
    line-height: 1.7;
    color: #bbb;
    font-weight: 300;
  }
  .modal-section ul { padding-left: 18px; }
  .modal-section li { margin-bottom: 4px; }

  /* Progress bar */
  .progress-bar-wrap {
    margin-bottom: 40px;
    display: flex; align-items: center; gap: 16px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-g), var(--accent-p), var(--accent-a));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Reset btn */
  .reset-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }
</style>
</head>
<body>
<div class="wrap">

</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

let currentTab = 'gluteo';
let done = {};

function renderGrid(tab) {
  const grid = document.getElementById('grid');
  const exercises = data[tab].exercises;
  const color = data[tab].color;

  grid.innerHTML = '';
  exercises.forEach((ex, i) => {
    const key = `${tab}-${i}`;
    const isDone = done[key];
    const card = document.createElement('div');
    card.className = 'exercise-card' + (isDone ? ' done' : '');
    card.style.setProperty('--accent-color', color);
    card.style.animationDelay = `${i * 0.06}s`;
    card.innerHTML = `
      <div class="card-top">
        <span class="exercise-icon">${ex.icon}</span>
        <div class="check" style="--accent-color:${color}">${isDone ? '✓' : ''}</div>
      </div>
      <div class="exercise-name">${ex.name}</div>
      <div class="exercise-meta">
        <span class="badge" style="--accent-color:${color}">${ex.series}</span>
        <span class="badge" style="--accent-color:${color}">${ex.reps}</span>
      </div>
      <div class="exercise-desc">${ex.desc}</div>
      <div class="expand-icon">Ver instrucciones →</div>
    `;
    card.onclick = (e) => {
      if (e.target.classList.contains('check') || e.target.closest('.check')) {
        toggleDone(key, tab);
      } else {
        openModal(tab, i);
      }
    };
    card.querySelector('.check').onclick = (e) => {
      e.stopPropagation();
      toggleDone(key, tab);
    };
    grid.appendChild(card);
  });

  updateProgress(tab);
}

function toggleDone(key, tab) {
  done[key] = !done[key];
  renderGrid(tab);
}

function updateProgress(tab) {
  const exercises = data[tab].exercises;
  const total = exercises.length;
  const completed = exercises.filter((_, i) => done[`${tab}-${i}`]).length;
  const pct = total > 0 ? (completed / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed} / ${total} completados`;
}

function openModal(tab, idx) {
  const ex = data[tab].exercises[idx];
  const color = data[tab].color;
  document.getElementById('mIcon').textContent = ex.icon;
  document.getElementById('mTitle').textContent = ex.name;
  document.getElementById('mTitle').style.color = color;
  document.getElementById('mBadges').innerHTML = `
    <span class="badge" style="--accent-color:${color}">${ex.series}</span>
    <span class="badge" style="--accent-color:${color}">${ex.reps}</span>
  `;
  document.getElementById('mDesc').textContent = ex.desc;
  document.getElementById('mSteps').innerHTML = ex.steps.map(s => `<li>${s}</li>`).join('');
  document.getElementById('mTip').textContent = ex.tip;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

function resetAll() {
  done = {};
  renderGrid(currentTab);
}

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderGrid(currentTab);
  };
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

renderGrid('gluteo');
</script>
</body>
</html>
